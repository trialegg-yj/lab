<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>향 산업 통합 분석 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --purple:      #6B5CF6;
    --purple-dark: #4C3EBF;
    --purple-deep: #2D1F8A;
    --purple-light:#EAE7FD;
    --purple-soft: #F4F2FE;
    --purple-mid:  #9D8FF9;
    --ink:   #0F0E17;
    --body:  #2E2B3D;
    --muted: #7B7891;
    --border:#DDD9F5;
    --soft:  #F8F7FF;
    --white: #FFFFFF;
    --green: #3CB48A;
    --green-light: #E6F7F1;
    --gold:  #C4973E;
    --gold-light:  #FBF3E4;
    --rose:  #D06B8A;
    --rose-light:  #FCEEF3;
    --red:   #E05252;
    --red-light:   #FDEAEA;
  }

  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--soft);
    color: var(--body);
    line-height: 1.75;
  }

  /* ── TOP NAV ── */
  .main-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #1A1440;
    border-bottom: 1px solid rgba(157,143,249,.2);
    display: flex;
    align-items: stretch;
    overflow-x: auto;
  }
  .main-nav-logo {
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-right: 1px solid rgba(157,143,249,.2);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .main-nav-logo span {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--purple-mid);
    text-transform: uppercase;
  }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); }

  .nav-tabs {
    display: flex;
    flex: 1;
  }
  .nav-tab {
    padding: 16px 28px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    background: transparent;
    color: rgba(255,255,255,.45);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all .2s;
    white-space: nowrap;
    letter-spacing: -.2px;
  }
  .nav-tab:hover { color: rgba(255,255,255,.8); }
  .nav-tab.active {
    color: var(--white);
    border-bottom-color: var(--purple-mid);
    background: rgba(107,92,246,.08);
  }
  .nav-num {
    display: inline-block;
    font-size: 10px;
    font-weight: 800;
    color: var(--purple-mid);
    margin-right: 6px;
    letter-spacing: 1px;
  }

  /* ── PAGES ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── IFRAME ── */
  .page-iframe {
    width: 100%;
    height: calc(100vh - 53px);
    border: none;
    display: block;
  }

</style>
</head>
<body>

<!-- TOP NAVIGATION -->
<nav class="main-nav">
  <div class="main-nav-logo">
    <div class="nav-dot"></div>
    <span>향 산업 2026</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('trend', this)">
      <span class="nav-num">01</span>산업 트렌드 분석
    </button>
    <button class="nav-tab" onclick="showPage('product', this)">
      <span class="nav-num">02</span>제품군 분석
    </button>
    <button class="nav-tab" onclick="showPage('content', this)">
      <span class="nav-num">03</span>콘텐츠 전략
    </button>
    <button class="nav-tab" onclick="showPage('target', this)">
      <span class="nav-num">04</span>타겟 DB
    </button>
    <button class="nav-tab" onclick="showPage('strategy', this)">
      <span class="nav-num">05</span>전략 제안
    </button>
  </div>
</nav>

<!-- PAGES -->
<div id="page-trend" class="page active">
  <iframe class="page-iframe" src="fragrance-trend-2026.html" title="향 산업 트렌드 분석 2026"></iframe>
</div>

<div id="page-product" class="page">
  <iframe class="page-iframe" src="fragrance-product-2026.html" title="향 제품군 분석 2026"></iframe>
</div>

<div id="page-content" class="page">
  <iframe class="page-iframe" src="content-strategy-2026.html" title="스몰브랜드 콘텐츠 전략 2026"></iframe>
</div>

<div id="page-target" class="page">
  <iframe class="page-iframe" src="target-db-2026.html" title="향 타겟 DB 2026"></iframe>
</div>

<div id="page-strategy" class="page">
  <iframe class="page-iframe" src="strategy-2026.html" title="전략 제안 2026"></iframe>
</div>


<script>
function showPage(pageId, btn) {
  // hide all pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));

  document.getElementById('page-' + pageId).classList.add('active');
  btn.classList.add('active');
}
</script>

</body>
</html>
