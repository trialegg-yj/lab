<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 30px; }
    ul { list-style: none; padding: 0; }
    li { margin: 12px 0; }
    a { text-decoration: none; color: #0969da; font-size: 1rem; }
    a:hover { text-decoration: underline; }
    #pw-wall{position:fixed;inset:0;background:#f5f5f5;z-index:9999;display:flex;align-items:center;justify-content:center;}
    .pw-box{background:#fff;border-radius:14px;padding:36px 32px;box-shadow:0 6px 32px rgba(0,0,0,.1);text-align:center;width:300px;}
    .pw-box h2{font-size:17px;font-weight:700;margin-bottom:6px;}
    .pw-box p{font-size:13px;color:#888;margin-bottom:20px;}
    .pw-input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;text-align:center;letter-spacing:4px;outline:none;box-sizing:border-box;transition:.15s;}
    .pw-input:focus{border-color:#6c5ff7;}
    .pw-btn{margin-top:10px;width:100%;padding:10px;background:#6c5ff7;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
    .pw-btn:hover{background:#5a4ee0;}
    .pw-err{color:#e03e3e;font-size:12px;margin-top:8px;min-height:14px;}
  </style>
  <script>
    (function(){
      var PW='991206', KEY='lab_auth';
      if(localStorage.getItem(KEY)==='ok') return;
      document.addEventListener('DOMContentLoaded',function(){
        document.getElementById('pw-wall').style.display='flex';
        document.body.style.overflow='hidden';
      });
      window.__checkPw=function(){
        var val=document.getElementById('pw-input').value.trim();
        if(val===PW){localStorage.setItem(KEY,'ok');document.getElementById('pw-wall').style.display='none';document.body.style.overflow='';}
        else{document.getElementById('pw-err').textContent='비밀번호가 틀렸습니다.';document.getElementById('pw-input').value='';document.getElementById('pw-input').focus();}
      };
      window.__pwKey=function(e){if(e.key==='Enter')window.__checkPw();};
    })();
  </script>
</head>
<body>
<div id="pw-wall" style="display:none">
  <div class="pw-box">
    <h2>🔒 비공개 페이지</h2>
    <p>접근 권한이 필요합니다</p>
    <input id="pw-input" class="pw-input" type="password" placeholder="비밀번호 입력" onkeydown="__pwKey(event)" autofocus>
    <button class="pw-btn" onclick="__checkPw()">확인</button>
    <div id="pw-err" class="pw-err"></div>
  </div>
</div>
  <h1>Lab</h1>
  <ul>
    <li><a href="cosmetics-checklist.html">화장품책임판매관리자 의무 체크리스트</a></li>
    <li><a href="team-business-tree.html">Team Business 노션 구조도</a></li>
  </ul>
</body>
</html>
